<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visual Problem Transformer</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 900px;
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        font-size: 14px;
    }

    button {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #38bdf8;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #0ea5e9;
    }

    .output {
        margin-top: 20px;
        display: grid;
        gap: 10px;
    }

    .card {
        background: rgba(255,255,255,0.07);
        padding: 15px;
        border-radius: 12px;
    }

    .title {
        font-weight: bold;
        margin-bottom: 5px;
        color: #38bdf8;
    }

    .loading {
        text-align: center;
        margin-top: 10px;
        opacity: 0.7;
    }

    .answer {
        font-size: 20px;
        color: #4ade80;
        font-weight: bold;
    }

    .demo-buttons button {
        margin-top: 5px;
        background: #334155;
        color: white;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Visual Problem Transformer</h1>

    <textarea id="input" placeholder="Enter a physics or math word problem..."></textarea>

    <button onclick="solve()">Solve Problem</button>

    <div class="demo-buttons">
        <button onclick="loadDemo(1)">Demo 1: Inclined Plane</button>
        <button onclick="loadDemo(2)">Demo 2: Car Acceleration</button>
        <button onclick="loadDemo(3)">Demo 3: Quadratic Equation</button>
    </div>

    <div class="loading" id="loading"></div>

    <div class="output" id="output"></div>
</div>

<script>
function loadDemo(n) {
    const demos = [
        "A 5kg block slides down a 30 degree incline with friction coefficient 0.2",
        "A car accelerates from rest at 3 m/s^2 for 10 seconds",
        "Solve x^2 + 5x + 6 = 0"
    ];
    document.getElementById("input").value = demos[n-1];
}

function mockAI(input) {

    let base = {
        problem_summary: "Parsed STEM problem",
        variables: [
            { name: "unknown", value: "auto", unit: "" }
        ],
        concepts_used: ["mechanics", "algebra"],
        step_by_step_solution: [
            "Step 1: Identify variables",
            "Step 2: Apply relevant formula",
            "Step 3: Solve equation"
        ],
        visualization: {
            type: "force_diagram",
            description: "Draw object with forces acting on it",
            elements: ["force arrows", "labels", "axes"]
        },
        final_answer: "Computed result (mock)",
        intuition: "System behaves according to fundamental physical laws."
    };

    if (input.includes("incline")) {
        base.problem_summary = "Block on inclined plane with friction";
        base.concepts_used = ["Newton's laws", "friction", "vectors"];
        base.visualization.description =
            "Draw block on slope with gravity downward, normal force perpendicular, friction opposing motion";
        base.final_answer = "Acceleration depends on g(sinθ - μcosθ)";
    }

    if (input.includes("car")) {
        base.problem_summary = "Constant acceleration motion";
        base.concepts_used = ["kinematics"];
        base.visualization.description =
            "Draw car moving along straight line with velocity increasing over time graph";
        base.final_answer = "v = at = 30 m/s";
    }

    if (input.includes("x^2") || input.includes("quadratic")) {
        base.problem_summary = "Quadratic equation solving";
        base.concepts_used = ["algebra", "factorization"];
        base.visualization.description =
            "Plot parabola crossing x-axis at roots";
        base.final_answer = "x = -2, -3";
    }

    return base;
}

function render(data) {
    const out = document.getElementById("output");
    out.innerHTML = "";

    function card(title, content) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<div class="title">${title}</div>${content}`;
        out.appendChild(div);
    }

    card("Problem Summary", data.problem_summary);

    card("Concepts Used", data.concepts_used.join(", "));

    let steps = "<ol>";
    data.step_by_step_solution.forEach(s => steps += `<li>${s}</li>`);
    steps += "</ol>";
    card("Step-by-Step Solution", steps);

    card("Visualization", data.visualization.description);

    card("Final Answer", `<div class="answer">${data.final_answer}</div>`);

    card("Intuition", data.intuition);
}

async function solve() {
    const input = document.getElementById("input").value;
    const loading = document.getElementById("loading");

    loading.innerText = "AI is analyzing problem...";

    setTimeout(() => {
        const result = mockAI(input);
        render(result);
        loading.innerText = "";
    }, 1000);
}
</script>

</body>
</html>
