<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visual Problem Transformer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0d1420;
    --surface2: #111827;
    --border: rgba(99,179,237,0.12);
    --accent: #63b3ed;
    --accent2: #90cdf4;
    --green: #68d391;
    --purple: #b794f4;
    --orange: #f6ad55;
    --red: #fc8181;
    --text: #e2e8f0;
    --muted: #718096;
    --mono: 'Space Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 36px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, #e2e8f0 0%, #90cdf4 50%, #b794f4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .subtitle { color: var(--muted); font-size: 14px; }

  .main { width: 100%; max-width: 820px; }

  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }

  .input-area:focus-within { border-color: rgba(99,179,237,0.4); }

  .input-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    min-height: 90px;
    caret-color: var(--accent);
  }

  textarea::placeholder { color: var(--muted); }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 20px;
  }

  .btn-solve {
    flex: 1;
    min-width: 160px;
    padding: 13px 24px;
    background: linear-gradient(135deg, #2b6cb0, #553c9a);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-solve:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-solve:active { transform: translateY(0); }
  .btn-solve:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .toggles { display: flex; gap: 8px; flex-wrap: wrap; }

  .toggle {
    padding: 7px 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .toggle.active {
    background: rgba(99,179,237,0.1);
    border-color: rgba(99,179,237,0.35);
    color: var(--accent);
  }

  .toggle:hover { color: var(--accent2); border-color: rgba(99,179,237,0.3); }

  .loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 44px 20px;
    text-align: center;
  }

  .loader.active { display: flex; }

  .loader-ring {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }

  .output { display: flex; flex-direction: column; gap: 11px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    animation: fadeUp 0.32s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }

  .card-icon { font-size: 15px; }

  .card-title {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    flex: 1;
  }

  .card-body {
    padding: 15px 16px;
    font-size: 14px;
    line-height: 1.7;
  }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    background: rgba(99,179,237,0.09);
    color: var(--accent2);
    border: 1px solid rgba(99,179,237,0.18);
  }

  .tag.purple {
    background: rgba(183,148,244,0.09);
    color: var(--purple);
    border-color: rgba(183,148,244,0.22);
  }

  .steps-list {
    list-style: none;
    counter-reset: step;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .steps-list li {
    counter-increment: step;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 14px;
    line-height: 1.65;
  }

  .steps-list li::before {
    content: counter(step, decimal-leading-zero);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    opacity: 0.65;
    min-width: 22px;
    padding-top: 3px;
    flex-shrink: 0;
  }

  .vars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
  }

  .var-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 11px;
  }

  .var-sym {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--purple);
    margin-bottom: 3px;
  }

  .var-val { font-size: 13px; color: var(--text); }
  .var-name { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .viz-block {
    background: var(--surface2);
    border-left: 3px solid var(--orange);
    border-radius: 0 8px 8px 0;
    padding: 13px 15px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.85;
    color: #fbd38d;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .canvas-wrap {
    margin-top: 14px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
  }

  canvas { display: block; width: 100%; }

  .answer-box {
    background: rgba(104,211,145,0.07);
    border: 1px solid rgba(104,211,145,0.22);
    border-radius: 10px;
    padding: 15px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .answer-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
    line-height: 1.5;
    flex: 1;
  }

  .copy-btn {
    padding: 5px 11px;
    background: rgba(104,211,145,0.1);
    border: 1px solid rgba(104,211,145,0.28);
    border-radius: 6px;
    color: var(--green);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .copy-btn:hover { background: rgba(104,211,145,0.2); }

  .intuition-text {
    color: var(--accent2);
    font-size: 14px;
    line-height: 1.7;
    font-style: italic;
  }

  .assumption-list { display: flex; flex-direction: column; gap: 5px; }
  .assumption-list p { color: var(--muted); font-size: 13px; }
  .assumption-list p::before { content: "→ "; color: var(--accent); }

  .simple-card {
    background: rgba(183,148,244,0.06);
    border: 1px solid rgba(183,148,244,0.18);
    border-radius: 14px;
    padding: 20px;
    animation: fadeUp 0.3s ease both;
  }

  .simple-card h3 {
    font-size: 10px;
    font-family: var(--mono);
    letter-spacing: 0.15em;
    color: var(--purple);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .simple-card p { font-size: 15px; line-height: 1.75; }

  .domain-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-family: var(--mono);
    background: rgba(183,148,244,0.1);
    color: var(--purple);
    border: 1px solid rgba(183,148,244,0.22);
    margin-right: 8px;
    vertical-align: middle;
  }

  .formula-block {
    background: var(--surface2);
    border-left: 3px solid var(--purple);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--purple);
    margin-top: 10px;
    white-space: pre-wrap;
  }

  .error-box {
    background: rgba(252,129,74,0.07);
    border: 1px solid rgba(252,129,74,0.22);
    border-radius: 10px;
    padding: 15px 16px;
    color: #fc814a;
    font-size: 14px;
    line-height: 1.65;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Local Reasoning Engine</div>
  <h1>Visual Problem Transformer</h1>
  <p class="subtitle">Any physics, math, or STEM problem — structured, solved, visualized.</p>
</header>

<div class="main">
  <div class="input-area">
    <div class="input-label">Enter Problem</div>
    <textarea id="input" placeholder="e.g. 'A 5kg block slides down a 30° incline with μ=0.2' or 'Solve x² - 5x + 6 = 0' or 'Find the derivative of x³·sin(x)' or 'A car travels 60km at 90km/h, how long?'" rows="4"></textarea>
  </div>

  <div class="controls">
    <button class="btn-solve" id="solveBtn" onclick="solve()">→ Solve Problem</button>
    <div class="toggles">
      <button class="toggle" id="tSimple" onclick="toggleMode('simple')">Explain Simpler</button>
      <button class="toggle active" id="tFull" onclick="toggleMode('full')">Full Breakdown</button>
      <button class="toggle active" id="tViz" onclick="toggleSec('viz')">Visualization</button>
      <button class="toggle active" id="tInt" onclick="toggleSec('intuition')">Intuition</button>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text" id="loaderTxt">Parsing problem structure…</div>
  </div>

  <div class="output" id="output"></div>
</div>

<script>
/* =========================================================
   VISUAL PROBLEM TRANSFORMER — Pure JS Reasoning Engine
   No API calls. No external dependencies. Zero-shot logic.
   ========================================================= */

let mode = 'full', showViz = true, showInt = true, last = null;

const loaderMsgs = [
  'Parsing problem structure…',
  'Classifying domain and concepts…',
  'Extracting variables…',
  'Constructing solution steps…',
  'Generating visual blueprint…'
];

function toggleMode(m) {
  mode = m;
  document.getElementById('tSimple').classList.toggle('active', m === 'simple');
  document.getElementById('tFull').classList.toggle('active', m === 'full');
  if (last) render(last);
}

function toggleSec(s) {
  if (s === 'viz') {
    showViz = !showViz;
    document.getElementById('tViz').classList.toggle('active', showViz);
  } else {
    showInt = !showInt;
    document.getElementById('tInt').classList.toggle('active', showInt);
  }
  if (last) render(last);
}

/* =========================================================
   TOKENIZER — break problem into meaningful tokens
   ========================================================= */
function tokenize(text) {
  return text.toLowerCase()
    .replace(/[°℃℉]/g, d => ({ '°':'deg','℃':'celsius','℉':'fahrenheit' })[d] || d)
    .split(/[\s,;:]+/)
    .filter(Boolean);
}

/* =========================================================
   NUMBER EXTRACTOR — pull all numeric values with context
   ========================================================= */
function extractNumbers(text) {
  const nums = [];
  const re = /(-?\d+(?:\.\d+)?)\s*(kg|g|m\/s\^?2|m\/s|km\/h|m\/s2|km|m|cm|mm|s|min|hr|h|n|j|w|pa|k|°|deg|rad|%|ohm|v|a|f|hz|mol|l|ml)?/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    nums.push({ val: parseFloat(m[1]), unit: (m[2] || '').toLowerCase(), idx: m.index });
  }
  return nums;
}

/* =========================================================
   DOMAIN CLASSIFIER — semantic classification
   ========================================================= */
function classifyDomain(text) {
  const t = text.toLowerCase();

  const domains = [
    {
      name: 'Kinematics',
      sub: 'Classical Mechanics',
      score: 0,
      keys: ['velocity','speed','acceleration','distance','displacement','time','travels','moving',
             'thrown','projectile','falls','dropped','initial','final','decelerat','km/h','m/s',
             'how long','how far','when does','reach','arrive']
    },
    {
      name: 'Dynamics / Forces',
      sub: 'Classical Mechanics',
      score: 0,
      keys: ['force','mass','friction','incline','slope','normal','tension','weight','newton',
             'kg','block','slides','pulls','pushes','coefficient','μ','mu','gravity','g =',
             'net force','applied','equilibrium']
    },
    {
      name: 'Energy & Work',
      sub: 'Classical Mechanics',
      score: 0,
      keys: ['energy','work','power','kinetic','potential','joule','watt','conservation',
             'spring','elastic','thermal','heat','efficiency']
    },
    {
      name: 'Algebra',
      sub: 'Mathematics',
      score: 0,
      keys: ['solve','equation','x =','find x','quadratic','linear','root','factor',
             'x^2','x²','polynomial','simplify','expression','=0','= 0']
    },
    {
      name: 'Calculus',
      sub: 'Mathematics',
      score: 0,
      keys: ['derivative','differentiate','integral','integrate','limit','d/dx','dy/dx',
             "f'(x)",'∫','∂','gradient','rate of change','slope of','tangent','area under']
    },
    {
      name: 'Geometry & Trigonometry',
      sub: 'Mathematics',
      score: 0,
      keys: ['angle','triangle','circle','radius','diameter','area','perimeter','volume',
             'sin','cos','tan','hypotenuse','degrees','radians','rectangle','square','sphere',
             'cylinder','cone','polygon','pythagoras']
    },
    {
      name: 'Thermodynamics',
      sub: 'Physics',
      score: 0,
      keys: ['temperature','heat','pressure','volume','gas','kelvin','celsius','fahrenheit',
             'ideal gas','pv=nrt','entropy','carnot','boiling','melting','specific heat',
             'latent','thermal','thermo']
    },
    {
      name: 'Electricity & Circuits',
      sub: 'Physics',
      score: 0,
      keys: ['current','voltage','resistance','ohm','circuit','capacitor','inductor',
             'electric','charge','coulomb','field','potential','series','parallel',
             'battery','power dissipat','watt','ampere']
    },
    {
      name: 'Waves & Optics',
      sub: 'Physics',
      score: 0,
      keys: ['wave','frequency','wavelength','period','amplitude','sound','light','optics',
             'refraction','reflection','lens','mirror','doppler','hertz','oscillat']
    },
    {
      name: 'Statistics & Probability',
      sub: 'Mathematics',
      score: 0,
      keys: ['probability','mean','median','mode','standard deviation','variance','distribution',
             'sample','population','percent chance','likelihood','expected value','combination',
             'permutation','factorial','normal distribution']
    }
  ];

  for (const d of domains) {
    for (const k of d.keys) {
      if (t.includes(k)) d.score += 1;
    }
  }

  domains.sort((a, b) => b.score - a.score);
  const best = domains[0];
  const second = domains[1];

  return {
    domain: best.name,
    sub: best.sub,
    confidence: best.score,
    secondary: second.score > 0 ? second.name : null
  };
}

/* =========================================================
   VARIABLE EXTRACTOR — semantic parsing per domain
   ========================================================= */
function extractVariables(text, domain) {
  const t = text;
  const vars = [];
  const nums = extractNumbers(t);

  const patterns = [
    { re: /(\d+(?:\.\d+)?)\s*kg/gi,     name: 'Mass',         sym: 'm',  unit: 'kg' },
    { re: /(\d+(?:\.\d+)?)\s*m\/s(?!\^)/gi, name: 'Velocity', sym: 'v',  unit: 'm/s' },
    { re: /(\d+(?:\.\d+)?)\s*km\/h/gi,  name: 'Speed',        sym: 'v',  unit: 'km/h' },
    { re: /(\d+(?:\.\d+)?)\s*m\/s[\^]?2/gi, name: 'Acceleration', sym: 'a', unit: 'm/s²' },
    { re: /(\d+(?:\.\d+)?)\s*(?:m\b(?!\/)|meters?)/gi, name: 'Distance/Height', sym: 'd', unit: 'm' },
    { re: /(\d+(?:\.\d+)?)\s*km\b/gi,   name: 'Distance',     sym: 'd',  unit: 'km' },
    { re: /(\d+(?:\.\d+)?)\s*s(?:ec(?:onds?)?)?\b/gi, name: 'Time', sym: 't', unit: 's' },
    { re: /(\d+(?:\.\d+)?)\s*(?:min(?:utes?)?)\b/gi, name: 'Time', sym: 't', unit: 'min' },
    { re: /(\d+(?:\.\d+)?)\s*(?:hr|hour|hours?)\b/gi, name: 'Time', sym: 't', unit: 'h' },
    { re: /(\d+(?:\.\d+)?)\s*[°º](?:deg(?:rees?)?)?/gi, name: 'Angle', sym: 'θ', unit: '°' },
    { re: /(\d+(?:\.\d+)?)\s*n\b/gi,    name: 'Force',        sym: 'F',  unit: 'N' },
    { re: /(\d+(?:\.\d+)?)\s*j\b/gi,    name: 'Energy',       sym: 'E',  unit: 'J' },
    { re: /(\d+(?:\.\d+)?)\s*w\b/gi,    name: 'Power',        sym: 'P',  unit: 'W' },
    { re: /(\d+(?:\.\d+)?)\s*[kK]\b/gi, name: 'Temperature',  sym: 'T',  unit: 'K' },
    { re: /(\d+(?:\.\d+)?)\s*(?:°C|celsius)/gi, name: 'Temperature', sym: 'T', unit: '°C' },
    { re: /(\d+(?:\.\d+)?)\s*(?:°F|fahrenheit)/gi, name: 'Temperature', sym: 'T', unit: '°F' },
    { re: /(\d+(?:\.\d+)?)\s*v\b/gi,    name: 'Voltage',      sym: 'V',  unit: 'V' },
    { re: /(\d+(?:\.\d+)?)\s*(?:ohm|Ω)/gi, name: 'Resistance', sym: 'R', unit: 'Ω' },
    { re: /(\d+(?:\.\d+)?)\s*(?:hz|hertz)/gi, name: 'Frequency', sym: 'f', unit: 'Hz' },
    { re: /[μu](?:\s*=\s*|\s+)(\d+(?:\.\d+)?)/gi, name: 'Friction coefficient', sym: 'μ', unit: '' },
    { re: /coefficient[^0-9]*(\d+(?:\.\d+)?)/gi, name: 'Friction coefficient', sym: 'μ', unit: '' },
    { re: /(\d+(?:\.\d+)?)\s*%/gi,      name: 'Percentage',   sym: '%',  unit: '%' },
    { re: /radius[^0-9]*(\d+(?:\.\d+)?)/gi, name: 'Radius',   sym: 'r',  unit: '' },
  ];

  const seen = new Set();
  for (const p of patterns) {
    let m;
    p.re.lastIndex = 0;
    while ((m = p.re.exec(t)) !== null) {
      const key = p.sym + m[1];
      if (!seen.has(key)) {
        seen.add(key);
        vars.push({ name: p.name, sym: p.sym, val: m[1], unit: p.unit });
      }
    }
  }

  // Quadratic coefficients
  const quadMatch = t.match(/(-?\d+(?:\.\d+)?)\s*x[\^²]2?\s*([+-]\s*\d+(?:\.\d+)?)\s*x\s*([+-]\s*\d+(?:\.\d+)?)/i);
  if (quadMatch) {
    vars.push({ name: 'Coefficient a', sym: 'a', val: quadMatch[1], unit: '' });
    vars.push({ name: 'Coefficient b', sym: 'b', val: quadMatch[2].replace(/\s/g,''), unit: '' });
    vars.push({ name: 'Coefficient c', sym: 'c', val: quadMatch[3].replace(/\s/g,''), unit: '' });
  }

  return vars;
}

/* =========================================================
   CONCEPT MAPPER — domain → relevant concepts
   ========================================================= */
function mapConcepts(domain, text) {
  const t = text.toLowerCase();
  const conceptDB = {
    'Kinematics': [
      "Newton's first law",
      'Equations of motion (SUVAT)',
      'Displacement = velocity × time',
      'v = u + at',
      's = ut + ½at²',
      'v² = u² + 2as',
      'Uniform acceleration'
    ],
    'Dynamics / Forces': [
      "Newton's second law (F = ma)",
      'Normal force',
      'Frictional force (f = μN)',
      'Weight (W = mg)',
      'Vector decomposition',
      'Net force = ma',
      'Inclined plane analysis'
    ],
    'Energy & Work': [
      'Work-energy theorem (W = Fd)',
      'Kinetic energy (KE = ½mv²)',
      'Gravitational potential energy (PE = mgh)',
      'Conservation of energy',
      'Power (P = W/t)'
    ],
    'Algebra': [
      'Algebraic manipulation',
      t.includes('x^2') || t.includes('x²') || t.includes('quadratic') ? 'Quadratic formula: x = (-b ± √(b²-4ac)) / 2a' : null,
      'Factorization',
      'Zero product property'
    ].filter(Boolean),
    'Calculus': [
      t.includes('derivative') || t.includes('d/dx') ? 'Power rule: d/dx[xⁿ] = nxⁿ⁻¹' : null,
      t.includes('sin') || t.includes('cos') ? 'Product rule: d/dx[f·g] = f\'g + fg\'' : null,
      t.includes('integral') || t.includes('integrat') ? 'Fundamental theorem of calculus' : null,
      t.includes('integral') || t.includes('integrat') ? 'Integration by parts' : null,
      'Chain rule',
      'Differentiation from first principles'
    ].filter(Boolean),
    'Geometry & Trigonometry': [
      'SOH-CAH-TOA (sin/cos/tan definitions)',
      "Pythagorean theorem (a² + b² = c²)",
      t.includes('circle') ? 'Area = πr², Circumference = 2πr' : null,
      t.includes('triangle') ? 'Area = ½ × base × height' : null,
      t.includes('sphere') ? 'Volume = (4/3)πr³' : null,
      t.includes('cylinder') ? 'Volume = πr²h' : null
    ].filter(Boolean),
    'Thermodynamics': [
      'Ideal gas law (PV = nRT)',
      'Specific heat capacity (Q = mcΔT)',
      'First law of thermodynamics',
      'Thermal energy transfer',
      'Temperature conversion'
    ],
    'Electricity & Circuits': [
      "Ohm's law (V = IR)",
      'Power dissipation (P = IV = I²R)',
      'Series circuit: R_total = R1 + R2 + ...',
      'Parallel circuit: 1/R_total = 1/R1 + 1/R2 + ...',
      'Kirchhoff\'s laws'
    ],
    'Waves & Optics': [
      'Wave equation: v = fλ',
      'Period T = 1/f',
      "Snell's law (n₁sinθ₁ = n₂sinθ₂)",
      'Doppler effect',
      "Law of reflection"
    ],
    'Statistics & Probability': [
      'Mean = Σx / n',
      'Variance = Σ(x - μ)² / n',
      'Standard deviation = √variance',
      'P(A and B) = P(A) × P(B) [independent]',
      'P(A or B) = P(A) + P(B) - P(A and B)'
    ]
  };

  return conceptDB[domain] || ['Mathematical reasoning', 'Problem decomposition', 'Systematic solving'];
}

/* =========================================================
   STEP GENERATOR — builds solution steps per domain
   ========================================================= */
function generateSteps(text, domain, vars, nums) {
  const t = text.toLowerCase();
  const steps = [];
  const g = 9.81;

  const getVar = (sym) => vars.find(v => v.sym === sym);
  const num = (sym) => parseFloat(getVar(sym)?.val || 0);

  // ── KINEMATICS ──────────────────────────────────────────
  if (domain === 'Kinematics') {
    const v0 = nums.find(n => t.indexOf(n.val+'') < t.length/2 && n.unit && n.unit.includes('m/s'));
    const dist = vars.find(v => v.sym === 'd');
    const time = vars.find(v => v.sym === 't');
    const accel = vars.find(v => v.sym === 'a');
    const speed_kmh = vars.find(v => v.unit === 'km/h');

    if (speed_kmh && dist) {
      const v_val = parseFloat(speed_kmh.val);
      const d_val = parseFloat(dist.val);
      const t_hr = d_val / v_val;
      const t_min = t_hr * 60;
      steps.push(`Identify knowns: distance d = ${d_val} ${dist.unit}, speed v = ${v_val} km/h`);
      steps.push(`Apply time = distance / speed`);
      steps.push(`t = ${d_val} km ÷ ${v_val} km/h`);
      steps.push(`t = ${t_hr.toFixed(4)} hours = ${t_min.toFixed(1)} minutes`);
      return { steps, answer: `t = ${t_hr.toFixed(2)} hours (${t_min.toFixed(1)} min)`, formula: 't = d / v' };
    }

    if (t.includes('thrown') || t.includes('upward') || t.includes('cliff') || t.includes('drop') || t.includes('fall')) {
      const v0_val = v0 ? v0.val : (nums[0]?.val || 20);
      const h_val = dist ? parseFloat(dist.val) : (nums[1]?.val || 0);
      const isUp = t.includes('upward') || t.includes('thrown up') || t.includes('launch');
      const isCliff = t.includes('cliff') || t.includes('building') || t.includes('height') || t.includes('tower');

      steps.push(`Identify knowns: initial velocity u = ${v0_val} m/s ${isUp?'(upward)':'(downward)'}, height h = ${h_val} m, g = ${g} m/s²`);
      steps.push(`Set up coordinate system: positive direction upward, origin at launch point`);
      if (isUp && isCliff) {
        steps.push(`Position equation: y(t) = ${v0_val}t - ½(${g})t² + (${h_val})`);
        steps.push(`Ground reached when y(t) = 0: -${(g/2).toFixed(2)}t² + ${v0_val}t + ${h_val} = 0`);
        const a = -(g/2), b = parseFloat(v0_val), c = parseFloat(h_val);
        const disc = b*b - 4*a*c;
        const t1 = (-b + Math.sqrt(disc))/(2*a);
        const t2 = (-b - Math.sqrt(disc))/(2*a);
        const t_ans = Math.max(t1, t2);
        steps.push(`Apply quadratic formula: t = (-${v0_val} ± √(${v0_val}² + 2×${g/2}×${h_val})) / (${g})`);
        steps.push(`Discriminant = ${v0_val}² + 2×${(g/2).toFixed(2)}×${h_val} = ${disc.toFixed(2)}`);
        steps.push(`t = ${Math.abs(t_ans).toFixed(3)} s (taking positive root)`);
        return { steps, answer: `t = ${Math.abs(t_ans).toFixed(2)} seconds`, formula: 'y = ut - ½gt²' };
      } else {
        const t_fall = Math.sqrt(2 * parseFloat(h_val) / g);
        const v_impact = g * t_fall;
        steps.push(`Using free-fall equation: h = ½gt²`);
        steps.push(`t² = 2h/g = 2×${h_val}/${g} = ${(2*parseFloat(h_val)/g).toFixed(3)}`);
        steps.push(`t = √${(2*parseFloat(h_val)/g).toFixed(3)} = ${t_fall.toFixed(3)} s`);
        steps.push(`Impact velocity: v = gt = ${g}×${t_fall.toFixed(3)} = ${v_impact.toFixed(2)} m/s`);
        return { steps, answer: `t = ${t_fall.toFixed(2)} s, v_impact = ${v_impact.toFixed(2)} m/s`, formula: 'h = ½gt²' };
      }
    }

    if (accel && time) {
      const a_val = parseFloat(accel.val);
      const t_val = parseFloat(time.val);
      const v_final = a_val * t_val;
      const dist_calc = 0.5 * a_val * t_val * t_val;
      steps.push(`Identify knowns: a = ${a_val} m/s², t = ${t_val} s, initial velocity u = 0 (starts from rest)`);
      steps.push(`Find final velocity using v = u + at`);
      steps.push(`v = 0 + ${a_val} × ${t_val} = ${v_final.toFixed(2)} m/s`);
      steps.push(`Find distance using s = ut + ½at²`);
      steps.push(`s = 0×${t_val} + ½×${a_val}×${t_val}² = 0 + ${(0.5*a_val).toFixed(3)}×${t_val*t_val} = ${dist_calc.toFixed(2)} m`);
      return { steps, answer: `v = ${v_final.toFixed(2)} m/s, distance = ${dist_calc.toFixed(2)} m`, formula: 'v = u + at, s = ut + ½at²' };
    }

    steps.push('Identify all given quantities and unknowns');
    steps.push('Select the appropriate kinematic equation');
    steps.push('Substitute values and solve for the unknown');
    steps.push('Check units and direction signs');
    return { steps, answer: 'Apply kinematic equations with given values', formula: 'v = u + at, s = ut + ½at²' };
  }

  // ── DYNAMICS / FORCES ───────────────────────────────────
  if (domain === 'Dynamics / Forces') {
    const mass = num('m') || 1;
    const angle = num('θ') || 30;
    const mu = num('μ') || (parseFloat((t.match(/(?:μ|mu|coefficient)[^0-9]*([0-9.]+)/i)||[])[1]) || 0.2);
    const theta = angle * Math.PI / 180;

    const W = mass * g;
    const N = W * Math.cos(theta);
    const f_friction = mu * N;
    const F_parallel = W * Math.sin(theta);
    const F_net = F_parallel - f_friction;
    const accel = F_net / mass;

    steps.push(`Identify knowns: mass m = ${mass} kg, angle θ = ${angle}°, μ = ${mu}, g = ${g} m/s²`);
    steps.push(`Calculate weight: W = mg = ${mass} × ${g} = ${W.toFixed(2)} N`);
    steps.push(`Resolve weight along and perpendicular to incline`);
    steps.push(`Normal force: N = W·cos(${angle}°) = ${W.toFixed(2)} × ${Math.cos(theta).toFixed(4)} = ${N.toFixed(2)} N`);
    steps.push(`Gravitational component along incline: F∥ = W·sin(${angle}°) = ${W.toFixed(2)} × ${Math.sin(theta).toFixed(4)} = ${F_parallel.toFixed(2)} N`);
    steps.push(`Friction force: f = μN = ${mu} × ${N.toFixed(2)} = ${f_friction.toFixed(2)} N (opposing motion)`);
    steps.push(`Net force: F_net = F∥ - f = ${F_parallel.toFixed(2)} - ${f_friction.toFixed(2)} = ${F_net.toFixed(2)} N`);
    steps.push(`Acceleration: a = F_net / m = ${F_net.toFixed(2)} / ${mass} = ${accel.toFixed(3)} m/s²`);

    return {
      steps,
      answer: `a = ${accel.toFixed(3)} m/s² ${accel >= 0 ? '(accelerates down)' : '(decelerates / stays still)'}`,
      formula: 'a = g(sinθ - μcosθ)'
    };
  }

  // ── ENERGY & WORK ────────────────────────────────────────
  if (domain === 'Energy & Work') {
    const mass = num('m') || 1;
    const vel = parseFloat(vars.find(v=>v.unit==='m/s')?.val || 0);
    const height = parseFloat(vars.find(v=>v.sym==='d')?.val || 0);
    const KE = 0.5 * mass * vel * vel;
    const PE = mass * g * height;
    steps.push(`Identify knowns: m = ${mass} kg, v = ${vel} m/s, h = ${height} m`);
    steps.push(`Kinetic energy: KE = ½mv² = ½ × ${mass} × ${vel}² = ${KE.toFixed(2)} J`);
    steps.push(`Potential energy: PE = mgh = ${mass} × ${g} × ${height} = ${PE.toFixed(2)} J`);
    steps.push(`Total mechanical energy: E = KE + PE = ${(KE+PE).toFixed(2)} J`);
    steps.push(`By conservation of energy, if no non-conservative forces act, E is constant`);
    return { steps, answer: `KE = ${KE.toFixed(2)} J, PE = ${PE.toFixed(2)} J, Total = ${(KE+PE).toFixed(2)} J`, formula: 'E = ½mv² + mgh' };
  }

  // ── ALGEBRA (Quadratic) ─────────────────────────────────
  if (domain === 'Algebra') {
    const quadMatch = text.match(/(-?\d+(?:\.\d+)?)\s*x[\^²2]+\s*([+-]\s*\d+(?:\.\d+)?)\s*x\s*([+-]\s*\d+(?:\.\d+)?)/i);
    if (quadMatch) {
      const a = parseFloat(quadMatch[1]);
      const b = parseFloat(quadMatch[2].replace(/\s/g,''));
      const c = parseFloat(quadMatch[3].replace(/\s/g,''));
      const disc = b*b - 4*a*c;

      steps.push(`Identify the equation in standard form: ax² + bx + c = 0`);
      steps.push(`Extract coefficients: a = ${a}, b = ${b}, c = ${c}`);
      steps.push(`Calculate discriminant: Δ = b² - 4ac = (${b})² - 4×${a}×${c} = ${b*b} - ${4*a*c} = ${disc}`);

      if (disc > 0) {
        const x1 = (-b + Math.sqrt(disc)) / (2*a);
        const x2 = (-b - Math.sqrt(disc)) / (2*a);
        steps.push(`Δ > 0, so two real distinct roots exist`);
        steps.push(`x = (-b ± √Δ) / 2a = (${-b} ± √${disc}) / ${2*a}`);
        steps.push(`x₁ = (${-b} + ${Math.sqrt(disc).toFixed(4)}) / ${2*a} = ${x1.toFixed(4)}`);
        steps.push(`x₂ = (${-b} - ${Math.sqrt(disc).toFixed(4)}) / ${2*a} = ${x2.toFixed(4)}`);
        return { steps, answer: `x₁ = ${x1.toFixed(3)}, x₂ = ${x2.toFixed(3)}`, formula: 'x = (-b ± √(b²-4ac)) / 2a' };
      } else if (disc === 0) {
        const x = -b / (2*a);
        steps.push(`Δ = 0, so one repeated root`);
        steps.push(`x = -b/2a = ${-b}/${2*a} = ${x.toFixed(4)}`);
        return { steps, answer: `x = ${x.toFixed(3)} (repeated root)`, formula: 'x = -b / 2a' };
      } else {
        const re = -b/(2*a);
        const im = Math.sqrt(-disc)/(2*a);
        steps.push(`Δ < 0, so two complex conjugate roots`);
        steps.push(`x = ${re.toFixed(3)} ± ${im.toFixed(3)}i`);
        return { steps, answer: `x = ${re.toFixed(3)} + ${im.toFixed(3)}i and ${re.toFixed(3)} - ${im.toFixed(3)}i (complex)`, formula: 'x = (-b ± i√|Δ|) / 2a' };
      }
    }

    // Linear equation
    const linMatch = text.match(/(-?\d+(?:\.\d+)?)\s*x\s*([+-]\s*\d+(?:\.\d+)?)\s*=\s*(-?\d+(?:\.\d+)?)/i);
    if (linMatch) {
      const a = parseFloat(linMatch[1]);
      const b = parseFloat(linMatch[2].replace(/\s/g,''));
      const rhs = parseFloat(linMatch[3]);
      const x = (rhs - b) / a;
      steps.push(`Linear equation: ${a}x + (${b}) = ${rhs}`);
      steps.push(`Isolate x: ${a}x = ${rhs} - (${b}) = ${rhs - b}`);
      steps.push(`x = ${rhs - b} / ${a} = ${x.toFixed(4)}`);
      return { steps, answer: `x = ${x.toFixed(4)}`, formula: 'ax + b = c → x = (c-b)/a' };
    }

    steps.push('Write equation in standard form');
    steps.push('Identify type: linear, quadratic, or higher-order');
    steps.push('Apply appropriate method: factoring, completing the square, or quadratic formula');
    steps.push('Verify solution by substitution');
    return { steps, answer: 'Solve using the appropriate algebraic method', formula: 'Depends on equation type' };
  }

  // ── CALCULUS ─────────────────────────────────────────────
  if (domain === 'Calculus') {
    const isDerivative = t.includes('derivative') || t.includes('differentiate') || t.includes('d/dx');
    const isIntegral = t.includes('integral') || t.includes('integrate') || t.includes('∫');

    if (isDerivative) {
      // Detect x^n * sin(x), x^n * cos(x), or pure polynomial
      const prodMatch = text.match(/x\^?(\d+)\s*[·*]\s*(sin|cos|tan|ln|e\^x)/i) ||
                        text.match(/(sin|cos|tan|ln|e\^x)\s*[·*]\s*x\^?(\d+)/i);
      const polyMatch = text.match(/(\d+)\s*x\^?(\d+)/i);
      const sinMatch  = text.match(/sin\(x\)/i);
      const cosMatch  = text.match(/cos\(x\)/i);

      if (prodMatch) {
        const n = parseInt(prodMatch[1] || prodMatch[2] || 3);
        const fn = (prodMatch[2] || prodMatch[1] || 'sin').toLowerCase();
        steps.push(`Identify structure: f(x) = x^${n} · ${fn}(x)`);
        steps.push(`This requires the Product Rule: d/dx[u·v] = u'v + uv'`);
        steps.push(`Let u = x^${n}, so u' = ${n}x^${n-1}`);
        const deriv_fn = fn === 'sin' ? 'cos(x)' : fn === 'cos' ? '-sin(x)' : fn === 'tan' ? 'sec²(x)' : fn === 'ln' ? '1/x' : 'eˣ';
        steps.push(`Let v = ${fn}(x), so v' = ${deriv_fn}`);
        steps.push(`Applying product rule: f'(x) = u'v + uv'`);
        steps.push(`f'(x) = ${n}x^${n-1}·${fn}(x) + x^${n}·${deriv_fn}`);
        steps.push(`Factor if possible: f'(x) = x^${n-1}[${n}${fn}(x) + x·${deriv_fn}]`);
        return {
          steps,
          answer: `f'(x) = ${n}x^${n-1}·${fn}(x) + x^${n}·${deriv_fn}`,
          formula: 'd/dx[uv] = u\'v + uv\''
        };
      }

      if (polyMatch) {
        const coef = parseInt(polyMatch[1]);
        const power = parseInt(polyMatch[2]);
        steps.push(`Identify function: f(x) = ${coef}x^${power}`);
        steps.push(`Apply power rule: d/dx[axⁿ] = a·n·xⁿ⁻¹`);
        steps.push(`f'(x) = ${coef} × ${power} × x^${power-1} = ${coef*power}x^${power-1}`);
        return { steps, answer: `f'(x) = ${coef*power}x^${power-1}`, formula: 'd/dx[axⁿ] = anxⁿ⁻¹' };
      }

      steps.push('Identify the function and its structure (product, chain, quotient, etc.)');
      steps.push('Apply the appropriate differentiation rule');
      steps.push('Simplify the resulting expression');
      steps.push('Check by differentiating a second time or verifying at a known point');
      return { steps, answer: "Apply differentiation rules to find f'(x)", formula: "d/dx[xⁿ] = nxⁿ⁻¹" };
    }

    if (isIntegral) {
      steps.push('Identify the integrand and limits (if definite integral)');
      steps.push('Check if integrand matches a standard form (power, trig, exponential)');
      steps.push('Apply integration technique: substitution, by parts, or partial fractions');
      steps.push('Evaluate at limits (definite) or add constant C (indefinite)');
      return { steps, answer: '∫f(x)dx — apply integration techniques', formula: '∫xⁿdx = xⁿ⁺¹/(n+1) + C' };
    }
  }

  // ── GEOMETRY & TRIG ──────────────────────────────────────
  if (domain === 'Geometry & Trigonometry') {
    const angle = num('θ') || 0;
    const radius = parseFloat((t.match(/radius[^0-9]*([0-9.]+)/i)||[])[1]) || num('d') || 0;
    const sideA = nums[0]?.val || 0;
    const sideB = nums[1]?.val || 0;

    if (t.includes('circle')) {
      const r = radius || sideA;
      steps.push(`Identify: circle with radius r = ${r}`);
      steps.push(`Area = πr² = π × ${r}² = ${(Math.PI*r*r).toFixed(4)}`);
      steps.push(`Circumference = 2πr = 2π × ${r} = ${(2*Math.PI*r).toFixed(4)}`);
      return { steps, answer: `Area = ${(Math.PI*r*r).toFixed(3)}, Circumference = ${(2*Math.PI*r).toFixed(3)}`, formula: 'A = πr², C = 2πr' };
    }

    if (t.includes('pythagoras') || t.includes('hypotenuse')) {
      const c = Math.sqrt(sideA*sideA + sideB*sideB);
      steps.push(`Identify right triangle with legs a = ${sideA}, b = ${sideB}`);
      steps.push(`Apply Pythagorean theorem: c² = a² + b²`);
      steps.push(`c² = ${sideA}² + ${sideB}² = ${sideA*sideA} + ${sideB*sideB} = ${sideA*sideA + sideB*sideB}`);
      steps.push(`c = √${sideA*sideA + sideB*sideB} = ${c.toFixed(4)}`);
      return { steps, answer: `Hypotenuse c = ${c.toFixed(3)}`, formula: 'c = √(a² + b²)' };
    }

    if (t.includes('sin') || t.includes('cos') || t.includes('tan')) {
      const deg = angle || sideA;
      const rad = deg * Math.PI / 180;
      steps.push(`Convert angle to radians: ${deg}° × π/180 = ${rad.toFixed(4)} rad`);
      steps.push(`sin(${deg}°) = ${Math.sin(rad).toFixed(6)}`);
      steps.push(`cos(${deg}°) = ${Math.cos(rad).toFixed(6)}`);
      steps.push(`tan(${deg}°) = ${Math.tan(rad).toFixed(6)}`);
      return { steps, answer: `sin=${Math.sin(rad).toFixed(4)}, cos=${Math.cos(rad).toFixed(4)}, tan=${Math.tan(rad).toFixed(4)}`, formula: 'SOH-CAH-TOA' };
    }

    steps.push('Identify the geometric shape and given measurements');
    steps.push('Select appropriate formula for the required quantity');
    steps.push('Substitute values and compute');
    steps.push('Verify result against expected range');
    return { steps, answer: 'Apply geometric/trigonometric formulas', formula: 'Depends on shape' };
  }

  // ── THERMODYNAMICS ───────────────────────────────────────
  if (domain === 'Thermodynamics') {
    const mass = num('m') || 1;
    const T1 = parseFloat(vars.find(v=>v.unit==='°C'||v.unit==='K')?.val || nums[0]?.val || 100);
    const T2 = parseFloat(nums[1]?.val || 200);
    steps.push(`Identify the thermodynamic process and given quantities`);
    steps.push(`For ideal gas: PV = nRT; for heat: Q = mcΔT`);
    steps.push(`ΔT = T₂ - T₁ = ${T2} - ${T1} = ${T2-T1}`);
    if (t.includes('specific heat') || t.includes('q =') || t.includes('heat')) {
      const c_specific = 4186; // water
      const Q = mass * c_specific * (T2-T1);
      steps.push(`Using Q = mcΔT with c = ${c_specific} J/kg·K (water)`);
      steps.push(`Q = ${mass} × ${c_specific} × ${T2-T1} = ${Q.toFixed(2)} J`);
      return { steps, answer: `Q = ${Q.toFixed(2)} J`, formula: 'Q = mcΔT' };
    }
    steps.push(`Apply first law: ΔU = Q - W`);
    steps.push(`Identify state variables and compute`);
    return { steps, answer: 'Apply thermodynamic laws with given state variables', formula: 'PV = nRT, Q = mcΔT' };
  }

  // ── ELECTRICITY ──────────────────────────────────────────
  if (domain === 'Electricity & Circuits') {
    const V = parseFloat(vars.find(v=>v.unit==='V')?.val || nums[0]?.val || 0);
    const R = parseFloat(vars.find(v=>v.unit==='Ω')?.val || nums[1]?.val || 1);
    const I = V / R;
    const P = V * I;
    steps.push(`Identify circuit quantities: V = ${V} V, R = ${R} Ω`);
    steps.push(`Apply Ohm's Law: I = V/R = ${V}/${R} = ${I.toFixed(4)} A`);
    steps.push(`Calculate power: P = VI = ${V} × ${I.toFixed(4)} = ${P.toFixed(4)} W`);
    steps.push(`Alternatively: P = V²/R = ${V}²/${R} = ${(V*V/R).toFixed(4)} W`);
    return { steps, answer: `I = ${I.toFixed(3)} A, P = ${P.toFixed(3)} W`, formula: "V=IR, P=VI" };
  }

  // ── STATISTICS ───────────────────────────────────────────
  if (domain === 'Statistics & Probability') {
    const numsList = nums.map(n => n.val).filter(v => v > 0);
    if (numsList.length > 2) {
      const mean = numsList.reduce((s,v)=>s+v,0)/numsList.length;
      const sorted = [...numsList].sort((a,b)=>a-b);
      const median = sorted.length%2===0 ? (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2 : sorted[Math.floor(sorted.length/2)];
      const variance = numsList.reduce((s,v)=>s+(v-mean)*(v-mean),0)/numsList.length;
      const sd = Math.sqrt(variance);
      steps.push(`Dataset: [${numsList.join(', ')}]`);
      steps.push(`Mean = (${numsList.join('+')}) / ${numsList.length} = ${mean.toFixed(4)}`);
      steps.push(`Sort for median: [${sorted.join(', ')}], median = ${median}`);
      steps.push(`Variance = Σ(xᵢ - μ)² / n = ${variance.toFixed(4)}`);
      steps.push(`Standard deviation σ = √variance = ${sd.toFixed(4)}`);
      return { steps, answer: `Mean = ${mean.toFixed(3)}, Median = ${median}, σ = ${sd.toFixed(3)}`, formula: 'μ = Σx/n, σ = √(Σ(x-μ)²/n)' };
    }
    steps.push('Collect and organize the dataset');
    steps.push('Calculate measures of central tendency (mean, median, mode)');
    steps.push('Calculate measures of spread (variance, standard deviation)');
    steps.push('Interpret results in context');
    return { steps, answer: 'Apply statistical formulas to the dataset', formula: 'μ = Σx/n' };
  }

  // ── WAVES & OPTICS ───────────────────────────────────────
  if (domain === 'Waves & Optics') {
    const freq = parseFloat(vars.find(v=>v.unit==='Hz')?.val || nums[0]?.val || 0);
    const wavelen = freq ? 343/freq : 0;
    steps.push(`Identify wave properties from the problem`);
    if (freq) {
      steps.push(`Given frequency f = ${freq} Hz`);
      steps.push(`Speed of sound ≈ 343 m/s (at 20°C)`);
      steps.push(`Wavelength: λ = v/f = 343/${freq} = ${wavelen.toFixed(4)} m`);
      steps.push(`Period: T = 1/f = 1/${freq} = ${(1/freq).toFixed(6)} s`);
      return { steps, answer: `λ = ${wavelen.toFixed(4)} m, T = ${(1/freq).toFixed(6)} s`, formula: 'v = fλ, T = 1/f' };
    }
    steps.push('Identify wave parameters: amplitude, frequency, wavelength, speed');
    steps.push('Apply wave equation: v = fλ');
    steps.push('Calculate period if needed: T = 1/f');
    return { steps, answer: 'Apply wave equation v = fλ', formula: 'v = fλ' };
  }

  // ── FALLBACK ─────────────────────────────────────────────
  steps.push('Read and identify all given information');
  steps.push('Define variables and list unknowns');
  steps.push('Select the governing equation(s) for this problem type');
  steps.push('Substitute values and solve algebraically');
  steps.push('Verify units and physical reasonableness of the answer');
  return { steps, answer: 'Solve systematically using appropriate formulas', formula: 'Context-dependent' };
}

/* =========================================================
   CANVAS RENDERER — draw simple visual for math problems
   ========================================================= */
function drawCanvas(domain, vars, text, solverResult) {
  const canvasId = 'vizCanvas_' + Date.now();
  setTimeout(() => {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    ctx.fillStyle = '#111827';
    ctx.fillRect(0,0,W,H);

    const accent = '#63b3ed';
    const orange = '#f6ad55';
    const green  = '#68d391';
    const purple = '#b794f4';
    const white  = '#e2e8f0';
    const muted  = '#718096';

    function line(x1,y1,x2,y2,color='#4a5568',width=1.5) {
      ctx.strokeStyle = color; ctx.lineWidth = width;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    function arrow(x1,y1,x2,y2,color,width=2) {
      line(x1,y1,x2,y2,color,width);
      const ang = Math.atan2(y2-y1,x2-x1);
      const hs = 10;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2,y2);
      ctx.lineTo(x2-hs*Math.cos(ang-0.4),y2-hs*Math.sin(ang-0.4));
      ctx.lineTo(x2-hs*Math.cos(ang+0.4),y2-hs*Math.sin(ang+0.4));
      ctx.closePath(); ctx.fill();
    }
    function txt(s,x,y,color=white,size=12,align='left') {
      ctx.fillStyle=color; ctx.font=`${size}px 'Space Mono', monospace`;
      ctx.textAlign=align; ctx.fillText(s,x,y);
    }
    function axes(cx,cy,hw,hh) {
      arrow(cx-hw,cy,cx+hw,cy,muted,1.5);
      arrow(cx,cy+hh,cx,cy-hh,muted,1.5);
      txt('x',cx+hw-8,cy+16,muted,11);
      txt('y',cx+8,cy-hh+14,muted,11);
      ctx.strokeStyle='rgba(99,179,237,0.08)'; ctx.lineWidth=0.5;
      for(let i=-4;i<=4;i++){
        if(i===0)continue;
        ctx.beginPath();ctx.moveTo(cx+i*(hw/4),cy-hh);ctx.lineTo(cx+i*(hw/4),cy+hh);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx-hw,cy+i*(hh/4));ctx.lineTo(cx+hw,cy+i*(hh/4));ctx.stroke();
      }
    }

    // ── QUADRATIC / ALGEBRA ─────────────────────────────────
    if (domain === 'Algebra') {
      const cx = W/2, cy = H/2, hw = W*0.42, hh = H*0.42;
      axes(cx,cy,hw,hh);
      txt('y = f(x)', cx-hw+8, cy-hh+18, muted, 10);

      const aCoef = parseFloat(vars.find(v=>v.sym==='a')?.val || 1);
      const bCoef = parseFloat(vars.find(v=>v.sym==='b')?.val || 0);
      const cCoef = parseFloat(vars.find(v=>v.sym==='c')?.val || 0);
      const disc  = bCoef*bCoef - 4*aCoef*cCoef;
      const scale = hh / (Math.max(Math.abs(cCoef), 10) * 1.6 + 2);

      ctx.strokeStyle = accent; ctx.lineWidth = 2;
      ctx.beginPath();
      let first = true;
      for(let px=-hw; px<=hw; px+=2){
        const xv = px / (hw/5);
        const yv = aCoef*xv*xv + bCoef*xv + cCoef;
        const sy = cy - yv * scale;
        if(Math.abs(sy-cy)>hh+20){first=true;continue;}
        first ? ctx.moveTo(cx+px,sy) : ctx.lineTo(cx+px,sy);
        first=false;
      }
      ctx.stroke();

      // roots
      if(disc >= 0) {
        const x1 = (-bCoef + Math.sqrt(disc))/(2*aCoef);
        const x2 = (-bCoef - Math.sqrt(disc))/(2*aCoef);
        [x1,x2].forEach((xr,i) => {
          const px = xr*(hw/5);
          ctx.fillStyle = green;
          ctx.beginPath(); ctx.arc(cx+px, cy, 5, 0, Math.PI*2); ctx.fill();
          txt(`x${i===0?'₁':'₂'}=${xr.toFixed(2)}`, cx+px+7, cy-10, green, 10);
        });
      }
      // vertex
      const vx = -bCoef/(2*aCoef);
      const vy = aCoef*vx*vx + bCoef*vx + cCoef;
      const vpx = cx + vx*(hw/5), vpy = cy - vy*scale;
      ctx.fillStyle = orange;
      ctx.beginPath(); ctx.arc(vpx, vpy, 5, 0, Math.PI*2); ctx.fill();
      txt(`vertex`, vpx+7, vpy-8, orange, 10);

      txt('Quadratic f(x) = ax²+bx+c', cx, H-14, muted, 10, 'center');
    }

    // ── CALCULUS ────────────────────────────────────────────
    else if (domain === 'Calculus') {
      const cx = W/2, cy = H*0.55, hw = W*0.42, hh = H*0.42;
      axes(cx,cy,hw,hh);

      const t2 = text.toLowerCase();
      const n = parseInt((t2.match(/x\^?(\d+)/)||[])[1]||3);
      const trigFn = t2.includes('sin') ? Math.sin : t2.includes('cos') ? Math.cos : null;
      const scale = hh / 6;

      // f(x)
      ctx.strokeStyle = accent; ctx.lineWidth = 2;
      ctx.beginPath(); let first=true;
      for(let px=-hw;px<=hw;px+=2){
        const xv = px/(hw/3.5);
        let yv = trigFn ? Math.pow(xv,n)*trigFn(xv) : Math.pow(xv,n);
        yv = Math.max(-hh/scale-1, Math.min(hh/scale+1, yv));
        const sy = cy-yv*scale;
        first ? ctx.moveTo(cx+px,sy) : ctx.lineTo(cx+px,sy);
        first=false;
      }
      ctx.stroke();

      // f'(x)
      ctx.strokeStyle = orange; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
      ctx.beginPath(); first=true;
      for(let px=-hw;px<=hw;px+=2){
        const xv = px/(hw/3.5);
        let yv;
        if(trigFn === Math.sin)      yv = n*Math.pow(xv,n-1)*Math.sin(xv) + Math.pow(xv,n)*Math.cos(xv);
        else if(trigFn === Math.cos) yv = n*Math.pow(xv,n-1)*Math.cos(xv) - Math.pow(xv,n)*Math.sin(xv);
        else                         yv = n*Math.pow(xv,n-1);
        yv = Math.max(-hh/scale-1, Math.min(hh/scale+1, yv));
        const sy = cy-yv*scale;
        first ? ctx.moveTo(cx+px,sy) : ctx.lineTo(cx+px,sy);
        first=false;
      }
      ctx.stroke(); ctx.setLineDash([]);

      txt('─ f(x)', W-68, 22, accent, 11);
      txt('- f\'(x)', W-68, 38, orange, 11);
      txt('Derivative visualization', cx, H-14, muted, 10, 'center');
    }

    // ── FREE BODY DIAGRAM ────────────────────────────────────
    else if (domain === 'Dynamics / Forces') {
      const angle = parseFloat(vars.find(v=>v.sym==='θ')?.val || 30);
      const rad = angle * Math.PI / 180;
      const cx = W*0.48, cy = H*0.48;
      const bw = 52, bh = 38;

      // incline surface
      const slen = W*0.7;
      const ix1 = cx-slen/2, iy1 = cy+bh*2+50;
      const ix2 = ix1 + slen*Math.cos(rad), iy2 = iy1 - slen*Math.sin(rad);
      ctx.strokeStyle='#4a5568'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ix1,iy1); ctx.lineTo(ix2,iy2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ix1,iy1); ctx.lineTo(ix2,iy1); ctx.stroke();

      // angle arc
      ctx.strokeStyle=muted; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(ix1,iy1,40,-(rad),0); ctx.stroke();
      txt(`${angle}°`, ix1+45, iy1-8, muted, 11);

      // block (rotated)
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(-rad);
      ctx.fillStyle='#1e3a5f';
      ctx.strokeStyle=accent; ctx.lineWidth=1.5;
      ctx.fillRect(-bw/2,-bh/2,bw,bh);
      ctx.strokeRect(-bw/2,-bh/2,bw,bh);
      ctx.restore();

      // Weight down
      arrow(cx,cy,cx,cy+75,orange,2.5);
      txt('W=mg',cx+5,cy+78,orange,11);

      // Normal force (perpendicular to incline)
      const nx = -Math.sin(rad)*75, ny = -Math.cos(rad)*75;
      arrow(cx,cy,cx+nx,cy+ny,green,2.5);
      txt('N',cx+nx+5,cy+ny-5,green,11);

      // Friction (along incline, opposing motion)
      const fx = -Math.cos(rad)*60, fy = Math.sin(rad)*60;
      arrow(cx,cy,cx+fx,cy+fy,purple,2.5);
      txt('f=μN',cx+fx-42,cy+fy+5,purple,11);

      txt('Free Body Diagram', W/2, H-14, muted, 10, 'center');
    }

    // ── KINEMATICS MOTION DIAGRAM ─────────────────────────────
    else if (domain === 'Kinematics') {
      const cy = H/2, margin = 60;
      const isVertical = text.toLowerCase().includes('fall') || text.toLowerCase().includes('throw') || text.toLowerCase().includes('cliff');

      if (isVertical) {
        // parabolic trajectory
        const ox = margin+20, oy = H*0.8;
        arrow(ox, oy, W-margin, oy, muted, 1.5); // ground
        arrow(ox, oy, ox, H*0.1, muted, 1.5);    // height axis
        txt('x', W-margin+5, oy+5, muted, 11);
        txt('y', ox+5, H*0.1-5, muted, 11);

        ctx.strokeStyle=accent; ctx.lineWidth=2;
        ctx.beginPath();
        const rx = W-margin-ox-20, ry = H*0.55;
        for(let t=0; t<=1; t+=0.01){
          const px = ox + t*rx;
          const py = oy - (4*ry*t*(1-t));
          t===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        ctx.stroke();

        // dots at intervals
        [0,0.25,0.5,0.75,1].forEach(t=>{
          const px = ox + t*rx, py = oy - (4*ry*t*(1-t));
          ctx.fillStyle = t===0||t===1 ? green : orange;
          ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
        });

        arrow(ox+10,oy,ox+10,oy-ry*0.8,green,1.5);
        txt('v₀↑', ox+15, oy-ry*0.4, green, 11);
        ctx.fillStyle=muted; ctx.fillRect(ox-5,oy,W-margin*2+10,3);
        txt('ground', W/2, oy+16, muted, 10, 'center');
      } else {
        // horizontal motion diagram
        const y = cy, xs = margin+20, xe = W-margin-20;
        arrow(xs,y,xe,y,'#4a5568',1.5);

        const steps = 5;
        for(let i=0;i<=steps;i++){
          const spacing = i*i * ((xe-xs)/(steps*steps));
          const px = xs+spacing;
          const r = i===0||i===steps ? 5 : 4;
          ctx.fillStyle = i===0 ? green : i===steps ? orange : accent;
          ctx.beginPath(); ctx.arc(px,y,r,0,Math.PI*2); ctx.fill();
          if(i<steps) {
            arrow(px+6,y-18,px+spacing-(steps-i-1)*10,y-18,accent,1.5);
          }
        }
        txt('Increasing spacing = acceleration', W/2, cy-35, muted, 10, 'center');
        txt('START', xs, cy+18, green, 10, 'center');
        txt('END', xe, cy+18, orange, 10, 'center');
      }
      txt('Motion Diagram', W/2, H-14, muted, 10, 'center');
    }

    // ── WAVES ────────────────────────────────────────────────
    else if (domain === 'Waves & Optics') {
      const cx = W/2, cy = H/2, hw = W*0.44, amp = H*0.25;
      arrow(W*0.06,cy,W*0.94,cy,muted,1.5);
      txt('x', W*0.94+5, cy+5, muted, 11);

      ctx.strokeStyle=accent; ctx.lineWidth=2.5;
      ctx.beginPath();
      for(let px=-hw;px<=hw;px+=2){
        const y = cy - amp*Math.sin(2*Math.PI*(px/(hw*0.7)));
        px===-hw ? ctx.moveTo(cx+px,y) : ctx.lineTo(cx+px,y);
      }
      ctx.stroke();

      const waveLen = hw*1.4;
      line(cx-waveLen/2, cy-amp-20, cx+waveLen/2, cy-amp-20, muted, 1);
      arrow(cx-waveLen/2,cy-amp-20,cx-waveLen/2,cy-amp-8,muted,1);
      arrow(cx+waveLen/2,cy-amp-20,cx+waveLen/2,cy-amp-8,muted,1);
      txt('λ', cx, cy-amp-24, accent, 13, 'center');

      line(cx+waveLen/4,cy,cx+waveLen/4,cy-amp,green,1);
      txt('A', cx+waveLen/4+8, cy-amp/2, green, 12);

      txt('Wave Diagram', W/2, H-14, muted, 10, 'center');
    }

    // ── GEOMETRY ─────────────────────────────────────────────
    else if (domain === 'Geometry & Trigonometry') {
      const t2 = text.toLowerCase();
      const cx = W/2, cy = H/2;

      if(t2.includes('circle')) {
        const r_val = parseFloat((t2.match(/radius[^0-9]*([0-9.]+)/i)||[])[1] || vars.find(v=>v.sym==='d')?.val || 80);
        const r = Math.min(r_val * (H*0.35/Math.max(r_val,1)), H*0.35);
        ctx.strokeStyle=accent; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(99,179,237,0.07)';
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=white; ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();
        line(cx,cy,cx+r,cy,green,1.5);
        txt(`r = ${r_val}`, cx+r/2, cy-10, green, 11, 'center');
        line(cx-r,cy,cx+r,cy,purple,1);
        txt('d = 2r', cx, cy+14, purple, 10, 'center');
        txt('Circle', W/2, H-14, muted, 10, 'center');
      } else {
        // right triangle
        const base = W*0.38, height = H*0.42;
        const x1=cx-base/2, y1=cy+height/2;
        const x2=cx+base/2, y2=cy+height/2;
        const x3=cx-base/2, y3=cy-height/2;
        ctx.strokeStyle=accent; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.stroke();
        ctx.fillStyle='rgba(99,179,237,0.05)'; ctx.fill();
        // right angle box
        const sq=12;
        ctx.strokeStyle=orange; ctx.lineWidth=1.5;
        ctx.strokeRect(x1,y1-sq,sq,sq);
        // labels
        txt('a', (x1+x2)/2, y1+18, green, 12, 'center');
        txt('b', x3-18, (y3+y1)/2, orange, 12, 'center');
        const hpx=(x2+x3)/2, hpy=(y2+y3)/2;
        txt('c', hpx+12, hpy, purple, 12);
        txt('a² + b² = c²', W/2, H-14, muted, 10, 'center');
      }
    }

    // ── DEFAULT: CONCEPT MAP ─────────────────────────────────
    else {
      const cx=W/2, cy=H/2;
      ctx.fillStyle='#1a2744';
      roundRect(ctx,cx-100,cy-30,200,60,10);
      ctx.fillStyle=accent;
      ctx.font='13px Space Mono';
      ctx.textAlign='center';
      ctx.fillText('SOLUTION', cx, cy+5);
      const inputs = vars.slice(0,4);
      inputs.forEach((v,i)=>{
        const angle2 = (i/inputs.length)*Math.PI*1.2 - Math.PI*0.85;
        const ix=cx+Math.cos(angle2)*140, iy=cy+Math.sin(angle2)*80;
        arrow(ix,iy,cx+(ix>cx?-105:105),cy,muted,1.2);
        ctx.fillStyle='#1a2744';
        roundRect(ctx,ix-45,iy-16,90,32,6);
        ctx.fillStyle=orange;
        ctx.font='11px Space Mono';
        ctx.textAlign='center';
        ctx.fillText(`${v.sym}=${v.val}${v.unit}`,ix,iy+4);
      });
      txt('Concept Map', W/2, H-14, muted, 10, 'center');
    }
  }, 80);

  return `<div class="canvas-wrap"><canvas id="${canvasId}" width="680" height="260"></canvas></div>`;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

/* =========================================================
   MAIN PIPELINE
   ========================================================= */
function solveProblem(input) {
  const classified = classifyDomain(input);
  const vars       = extractVariables(input, classified.domain);
  const nums       = extractNumbers(input);
  const concepts   = mapConcepts(classified.domain, input);
  const { steps, answer, formula } = generateSteps(input, classified.domain, vars, nums);
  const assumptions = generateAssumptions(classified.domain, input);
  const viz        = generateVisualization(classified.domain, input, vars, { answer });
  const intuition  = generateIntuition(classified.domain, input, answer);
  const simpleExp  = generateSimpleExplanation(classified.domain, input, answer);

  return {
    domain: classified.domain,
    sub: classified.sub,
    secondary: classified.secondary,
    problem_summary: summarizeProblem(input, classified.domain),
    variables: vars,
    assumptions,
    concepts_used: concepts,
    step_by_step_solution: steps,
    visualization: viz,
    formula,
    final_answer: answer,
    intuition,
    simpler_explanation: simpleExp,
    vars_raw: vars,
    nums_raw: nums
  };
}

function summarizeProblem(text, domain) {
  const t = text.trim();
  if (t.length <= 90) return t;
  return t.slice(0, 87) + '…';
}

/* =========================================================
   RENDERER
   ========================================================= */
function card(icon, title, bodyHTML, delay=0) {
  return `<div class="card" style="animation-delay:${delay}ms">
    <div class="card-header"><span class="card-icon">${icon}</span><span class="card-title">${title}</span></div>
    <div class="card-body">${bodyHTML}</div>
  </div>`;
}

function answerBox(answer) {
  const id = 'ans_' + Math.random().toString(36).slice(2);
  return `<div class="answer-box">
    <div class="answer-text" id="${id}">${esc(answer)}</div>
    <button class="copy-btn" onclick="copyAns('${id}')">COPY</button>
  </div>`;
}

function render(d) {
  const out = document.getElementById('output');
  out.innerHTML = '';
  let html = '', delay = 0;
  const s = 55;

  if (mode === 'simple') {
    html += `<div class="simple-card"><h3>Plain-English Explanation</h3><p>${esc(d.simpler_explanation)}</p></div>`;
    if (showInt) html += card('💡','Intuition',`<div class="intuition-text">${esc(d.intuition)}</div>`, s);
    html += card('✅','Answer', answerBox(d.final_answer), s*2);
    out.innerHTML = html;
    return;
  }

  // domain badge
  const badge = `<span class="tag purple">${esc(d.domain)}</span>${d.secondary ? `<span class="tag" style="margin-left:4px">${esc(d.secondary)}</span>` : ''}`;
  html += card('📋','Problem Summary', `<div style="margin-bottom:10px">${badge}</div>${esc(d.problem_summary)}`, delay); delay+=s;

  if (d.variables?.length) {
    const vhtml = `<div class="vars-grid">${d.variables.map(v=>
      `<div class="var-item"><div class="var-sym">${esc(v.sym)}</div><div class="var-val">${esc(v.val)} ${esc(v.unit)}</div><div class="var-name">${esc(v.name)}</div></div>`
    ).join('')}</div>`;
    html += card('📐','Extracted Variables', vhtml, delay); delay+=s;
  }

  if (d.assumptions?.length) {
    html += card('⚙️','Assumptions',
      `<div class="assumption-list">${d.assumptions.map(a=>`<p>${esc(a)}</p>`).join('')}</div>`, delay); delay+=s;
  }

  if (d.concepts_used?.length) {
    html += card('🧠','Concepts & Formulas',
      `<div class="tag-list">${d.concepts_used.map(c=>`<span class="tag">${esc(c)}</span>`).join('')}</div>
       ${d.formula ? `<div class="formula-block">${esc(d.formula)}</div>` : ''}`, delay); delay+=s;
  }

  if (d.step_by_step_solution?.length) {
    html += card('🔢','Step-by-Step Solution',
      `<ol class="steps-list">${d.step_by_step_solution.map(st=>`<li>${esc(st)}</li>`).join('')}</ol>`, delay); delay+=s;
  }

  if (showViz && d.visualization) {
    const v = d.visualization;
    const lines = [
      `Type: ${v.type}`,
      ...(v.diagram_instructions||[]).map(i=>'• '+i),
      (v.labels?.length ? '\nLabels: ' + v.labels.join(' | ') : '')
    ].filter(Boolean).join('\n');

    const canvasHtml = drawCanvas(d.domain, d.vars_raw||[], d.problem_summary, d);
    html += card('🎨','Visual Blueprint',
      `<div class="viz-block">${esc(lines)}</div>${canvasHtml}`, delay); delay+=s;
  }

  html += card('✅','Final Answer', answerBox(d.final_answer), delay); delay+=s;

  if (showInt && d.intuition) {
    html += card('💡','Intuition', `<div class="intuition-text">${esc(d.intuition)}</div>`, delay);
  }

  out.innerHTML = html;
}

/* =========================================================
   UI HELPERS
   ========================================================= */
let loaderTimer;

function startLoader() {
  let i = 0;
  const el = document.getElementById('loaderTxt');
  el.textContent = loaderMsgs[0];
  loaderTimer = setInterval(()=>{ el.textContent = loaderMsgs[++i % loaderMsgs.length]; }, 600);
}

function stopLoader() { clearInterval(loaderTimer); }

function solve() {
  const input = document.getElementById('input').value.trim();
  if (!input) return;

  const btn = document.getElementById('solveBtn');
  const loader = document.getElementById('loader');
  const out = document.getElementById('output');

  btn.disabled = true;
  btn.textContent = 'Reasoning…';
  out.innerHTML = '';
  loader.classList.add('active');
  startLoader();

  // Simulate brief processing delay for UX
  setTimeout(() => {
    try {
      const result = solveProblem(input);
      last = result;
      render(result);
    } catch(e) {
      out.innerHTML = `<div class="error-box">⚠ Parsing error: ${esc(e.message)}</div>`;
    }
    stopLoader();
    loader.classList.remove('active');
    btn.disabled = false;
    btn.textContent = '→ Solve Problem';
  }, 900);
}

function copyAns(id) {
  const text = document.getElementById(id)?.textContent || '';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.querySelector(`button[onclick="copyAns('${id}')"]`);
    if(btn){ btn.textContent='COPIED!'; setTimeout(()=>btn.textContent='COPY',1800); }
  });
}

function esc(s) {
  if(s==null)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('input').addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='Enter') solve();
});
</script>
